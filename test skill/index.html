<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello from InstaVM</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ec;
        --card: #fffdf8;
        --text: #1f1a17;
        --accent: #d86c3d;
        --accent-soft: #f2dbc8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, rgba(216, 108, 61, 0.18), transparent 30%),
          linear-gradient(135deg, var(--bg), #efe5d6);
        color: var(--text);
      }

      main {
        width: min(90vw, 680px);
        padding: 3rem;
        border: 1px solid rgba(31, 26, 23, 0.08);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 24px 80px rgba(31, 26, 23, 0.12);
        text-align: center;
      }

      p {
        margin: 0 0 1rem;
        font-size: 1.1rem;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.5rem, 8vw, 4.75rem);
        line-height: 0.95;
      }

      .pill {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.65rem 1rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Simple demo app</p>
      <h1>Hello, world!</h1>
      <p>This page is running from an InstaVM-hosted Python web server.</p>
      <span class="pill">Deployed with Codex</span>
    </main>
  </body>
</html>
